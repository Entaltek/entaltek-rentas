version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: entaltek_rentas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/entaltek_rentas
      CORS_ORIGINS: '["https://rentas.entaltek.com","https://api-rentas.entaltek.com"]'
      CORS_ALLOW_CREDENTIALS: "true"
      STORAGE_BACKEND: local
      STORAGE_LOCAL_DIR: /app/media
      STORAGE_BASE_URL: https://api-rentas.entaltek.com/media
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
  media_data:
